<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users - Admin Panel</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="images/logo.png" alt="Logo" class="me-2">
            <span class="fw-bold text-danger">Admin Panel</span>
        </div>
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html"><i class="bi bi-speedometer2"></i><span>Dashboard</span></a></li>
            <li class="menu-divider"></li>
            <li class="menu-header"><span>CUSTOMERS</span></li>
            <li><a href="admin-customers.html"><i class="bi bi-people"></i><span>All Customers</span></a></li>
            <li class="menu-divider"></li>
            <li class="menu-header"><span>SETTINGS</span></li>
            <li><a href="admin-admins.html" class="active"><i class="bi bi-shield-check"></i><span>Admin Users</span></a></li>
            <li><a href="admin-settings.html"><i class="bi bi-gear"></i><span>System Settings</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn btn-outline-danger w-100" onclick="adminLogout()"><i class="bi bi-box-arrow-left me-2"></i>Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">Admin Users</h4>
                    <small class="text-muted">Manage admin accounts and permissions</small>
                </div>
                <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addAdminModal">
                    <i class="bi bi-plus-circle me-2"></i>Add Admin
                </button>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="dashboard-card stats-card">
                    <div class="stats-icon" style="background: rgba(59, 130, 246, 0.1); color: #3B82F6;"><i class="bi bi-shield-check"></i></div>
                    <div class="flex-grow-1">
                        <p class="text-muted mb-1">Total Admins</p>
                        <h3 class="mb-0 fw-bold" id="totalAdmins">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="dashboard-card stats-card">
                    <div class="stats-icon" style="background: rgba(16, 185, 129, 0.1); color: #10B981;"><i class="bi bi-person-check"></i></div>
                    <div class="flex-grow-1">
                        <p class="text-muted mb-1">Active</p>
                        <h3 class="mb-0 fw-bold" id="activeAdmins">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="dashboard-card stats-card">
                    <div class="stats-icon" style="background: rgba(168, 85, 247, 0.1); color: #A855F7;"><i class="bi bi-clock-history"></i></div>
                    <div class="flex-grow-1">
                        <p class="text-muted mb-1">Last Login</p>
                        <h3 class="mb-0 fw-bold" style="font-size: 18px;">2 hours ago</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard-card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Admin</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Last Login</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminsTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add Admin Modal -->
    <div class="modal fade" id="addAdminModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Admin</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAdminForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="adminName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="adminEmail" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="adminUsername" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="adminPassword" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="adminRole" required>
                                <option value="super_admin">Super Admin</option>
                                <option value="admin">Admin</option>
                                <option value="moderator">Moderator</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveAdmin()">Add Admin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/admin-admins.js"></script>
</body>
</html>
