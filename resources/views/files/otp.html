<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - WhatsApp Campaign Platform</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleLanguage()">
            <i class="bi bi-globe"></i> <span id="lang-text">العربية</span>
        </button>
    </div>

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <img src="images/logo.png" alt="Logo" class="logo">
                        <div class="otp-icon my-3">
                            <i class="bi bi-shield-check"></i>
                        </div>
                        <h2 class="mt-3 mb-1" data-en="Verify OTP" data-ar="تأكيد رمز التحقق">Verify OTP</h2>
                        <p class="text-muted" data-en="Enter the verification code sent to" data-ar="أدخل رمز التحقق المرسل إلى">Enter the verification code sent to</p>
                        <p class="fw-semibold text-primary" id="phoneDisplay">+20 123 456 7890</p>
                    </div>

                    <!-- OTP Form -->
                    <form id="otpForm" onsubmit="handleOTP(event)">
                        <!-- OTP Input -->
                        <div class="mb-4">
                            <label class="form-label text-center w-100" data-en="Verification Code" data-ar="رمز التحقق">Verification Code</label>
                            <div class="otp-inputs d-flex justify-content-center gap-2">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp1" onkeyup="moveToNext(this, 'otp2')" onkeydown="moveToPrev(this, event)">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp2" onkeyup="moveToNext(this, 'otp3')" onkeydown="moveToPrev(this, event, 'otp1')">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp3" onkeyup="moveToNext(this, 'otp4')" onkeydown="moveToPrev(this, event, 'otp2')">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp4" onkeyup="moveToNext(this, 'otp5')" onkeydown="moveToPrev(this, event, 'otp3')">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp5" onkeyup="moveToNext(this, 'otp6')" onkeydown="moveToPrev(this, event, 'otp4')">
                                <input type="text" class="form-control otp-input text-center" maxlength="1" id="otp6" onkeydown="moveToPrev(this, event, 'otp5')">
                            </div>
                        </div>

                        <!-- Timer and Resend -->
                        <div class="text-center mb-4">
                            <p class="text-muted mb-2">
                                <span data-en="Didn't receive the code?" data-ar="لم تستلم الرمز؟">Didn't receive the code?</span>
                            </p>
                            <button type="button" class="btn btn-link text-decoration-none p-0" id="resendBtn" onclick="resendOTP()" disabled>
                                <i class="bi bi-arrow-clockwise me-1"></i>
                                <span data-en="Resend OTP" data-ar="إعادة إرسال الرمز">Resend OTP</span>
                                <span id="timer"> (60s)</span>
                            </button>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-check-circle me-2"></i>
                            <span data-en="Verify & Continue" data-ar="تحقق ومتابعة">Verify & Continue</span>
                        </button>

                        <!-- Back Link -->
                        <div class="text-center">
                            <a href="login.html" class="text-muted text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i>
                                <span data-en="Back to Login" data-ar="العودة لتسجيل الدخول">Back to Login</span>
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Footer -->
                <div class="text-center mt-4 text-muted small">
                    <p data-en="© 2024 WhatsApp Campaign Platform. All rights reserved." data-ar="© 2024 منصة حملات الواتساب. جميع الحقوق محفوظة.">© 2024 WhatsApp Campaign Platform. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/script.js"></script>
</body>
</html>
